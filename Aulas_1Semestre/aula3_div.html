<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula3/div</title>
    <style>
        .caixa-principal{
            border: solid 1px;
            padding: 2px;
        }
        .caixa-azul{
        height: 100px;
        width: 100px;
        background-color: blue;
        }
        .caixa-roxa{
        height: 100px;
        width: 100px;
        background-color: blueviolet;
        }
        .caixa-amarela{
        height: 100px;
        width: 100px;
        background-color: yellow;
        }
        .caixa-verde{
        height: 100px;
        width: 100px;
        background-color: green;
        }
    </style>
</head>
<body>
    <div class="caixa-principal">
        <div class="caixa-amarela"></div>
        <div class="caixa-azul"></div>
        <div class="caixa-roxa"></div>
        <div class="caixa-verde"></div>
    </div>
</body>
</html>
